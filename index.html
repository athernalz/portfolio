<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>athernals</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
    body {
        background-color: black;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }
    #videoGrid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        width: 90%;
        max-width: 1200px;
        visibility: hidden;
        opacity: 0;
        transition: visibility 0s, opacity 0.5s linear;
    }
    .videoItem {
        position: relative;
        border: 2px solid yellow;
        border-radius: 10px;
        overflow: hidden;
        padding-top: 56.25%;  /* 16:9 Aspect Ratio */
        transition: transform 0.3s;
    }
    .videoItem:hover {
        transform: scale(1.05);
    }
    iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        allowfullscreen;  /* Allow fullscreen */
    }
    #spinner {
        position: absolute;
        animation: spin 1s linear infinite;
    }
    .innerSpinner {
        width: 50px;
        height: 50px;
        border: 5px solid yellow;
        border-top-color: transparent;
        border-radius: 50%;
        animation: zoomIn 0.5s ease-out forwards;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes zoomIn {
        from { transform: scale(0); }
        to { transform: scale(1); }
    }
    #headerText {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        font-size: 2em;
        color: yellow;
        font-weight: bold;
        visibility: hidden;
    }
    #headerText a {
        color: yellow;
        text-decoration: none;
    }
    #socialText {
        position: absolute;
        top: 70px;
        width: 100%;
        text-align: center;
        visibility: hidden;
    }
    #socialText a {
        margin: 0 10px;
        color: yellow;
        text-decoration: none;
    }
    #footerButton {
        position: absolute;
        bottom: 20px;
        text-align: center;
        visibility: hidden;
        width: calc((100% - 40px) / 3);  /* Match video item width */
        margin: auto;
    }
    #footerButton a {
        display: block;
        font-size: 1.2em;
        color: yellow;
        text-decoration: none;
        border: 2px solid yellow;
        padding: 10px;
        border-radius: 5px;
        transition: background-color 0.3s;
        width: 100%;  /* Full width of the container */
        text-align: center;
    }
    #footerButton a:hover {
        background-color: yellow;
        color: black;
    }
</style>
</head>
<body>
<div id="headerText"><a href="https://twitter.com/athernalz">athernals</a></div>
<div id="socialText">
</div>
<div id="spinner">
    <div class="innerSpinner"></div>
</div>
<div id="videoGrid">
    <div class="videoItem">
        <iframe src="https://youtu.be/ouvJkNiuML0?si=uTi3RNvaYDypPGqy" title="Video 1" allowfullscreen></iframe>
    </div>
    <div class="videoItem">
        <iframe src="https://youtu.be/vthpiVmRTb8?si=NW9nRj3PNDGhK7e-" title="Video 2" allowfullscreen></iframe>
    </div>
    <div class="videoItem">
        <iframe src="https://youtu.be/QZGdZXFB41c?si=omyosQqGs7qxy7R1" title="Video 3" allowfullscreen></iframe>
    </div>
    <div class="videoItem">
        <iframe src="https://youtu.be/AqgEdVy4niM?si=6AZoib4oLtGQAwae" title="Video 4" allowfullscreen></iframe>
    </div>
    <div class="videoItem">
        <iframe src="https://youtu.be/ofZKSRVsHQM?si=35OiUoNY7_qVtc1U" title="Video 5" allowfullscreen></iframe>
    </div>
    <div class="videoItem">
        <iframe src="https://youtu.be/xCo2Ak1ghBE?si=3pD9GVxyuWOWaPJc" title="Video 6" allowfullscreen></iframe>
    </div>
</div>
<div id="footerButton">
    <a href="https://www.youtube.com/playlist?list=PLDgtGoyzH8ztOOznJwEXR9bmXWwplPBcp">more videos</a>
</div>
<script>
    setTimeout(function() {
        document.getElementById('spinner').style.display = 'none';
        var videoGrid = document.getElementById('videoGrid');
        videoGrid.style.visibility = 'visible';
        videoGrid.style.opacity = '1';
        document.getElementById('headerText').style.visibility = 'visible';
        document.getElementById('socialText').style.visibility = 'visible';
        document.getElementById('footerButton').style.visibility = 'visible';
    }, 2000);  // 2 seconds delay
</script>
</body>
</html>
